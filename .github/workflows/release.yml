name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:exe
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/FileSplitterPatcher.exe

  build-macos-arm64:
    name: Build macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:mac-arm64
      - run: codesign --force --sign - dist/FileSplitterPatcher-macos-arm64
      - run: zip -j dist/FileSplitterPatcher-macos-arm64.zip dist/FileSplitterPatcher-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/FileSplitterPatcher-macos-arm64.zip

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos-arm64
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          assets=(
            "release-assets/windows-x64/FileSplitterPatcher.exe"
            "release-assets/macos-arm64/FileSplitterPatcher-macos-arm64.zip"
          )

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${assets[@]}" --clobber
          else
            gh release create "$TAG_NAME" "${assets[@]}" --generate-notes --latest
          fi
